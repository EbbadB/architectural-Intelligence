  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

\">\n\n  <!-- ===================== HEADER ===================== -->\n  <header style=\"position:sticky;top:0;z-index:60;background:rgba(239,236,230,0.82);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);\">\n    <div style=\"max-width:1340px;margin:0 auto;padding:16px 30px;display:flex;align-items:center;gap:24px;\">\n      <div onclick=\"{{ goHome }}\" style=\"display:flex;align-items:baseline;gap:2px;cursor:pointer;flex:none;\">\n        <span style=\"font-family:'Playfair Display',serif;font-size:23px;font-weight:600;letter-spacing:-0.01em;\">Ai<\u002Fspan>\n        <span style=\"font-family:'Playfair Display',serif;font-style:italic;font-size:18px;font-weight:400;color:#6E2B2B;margin-left:3px;\">intelligence<\u002Fspan>\n      <\u002Fdiv>\n\n      <nav style=\"margin:0 auto;display:flex;align-items:center;gap:3px;background:rgba(255,255,255,0.55);border:1px solid rgba(0,0,0,0.05);border-radius:999px;padding:5px;\">\n        <sc-for list=\"{{ navItems }}\" as=\"item\" hint-placeholder-count=\"7\">\n          <a onclick=\"{{ item.go }}\" style=\"{{ item.style }}\">{{ item.label }}<\u002Fa>\n        <\u002Fsc-for>\n      <\u002Fnav>\n\n      <div style=\"display:flex;align-items:center;gap:10px;flex:none;\">\n        <button onclick=\"{{ goArcha }}\" style=\"display:inline-flex;align-items:center;gap:8px;font-family:'Hanken Grotesk',sans-serif;font-size:13.5px;font-weight:500;color:#211E1B;background:#FBFAF7;border:1px solid rgba(0,0,0,0.12);border-radius:999px;padding:9px 16px;cursor:pointer;white-space:nowrap;\">Try Archa <span style=\"font-size:11px;\">↗<\u002Fspan><\u002Fbutton>\n        <button onclick=\"{{ goContact }}\" style=\"display:inline-flex;align-items:center;gap:8px;font-family:'Hanken Grotesk',sans-serif;font-size:13.5px;font-weight:500;color:#fff;background:#6E2B2B;border:none;border-radius:999px;padding:10px 17px;cursor:pointer;white-space:nowrap;transition:background .2s;\" style-hover=\"background:#823636\">Book a Call <span style=\"font-size:11px;\">↗<\u002Fspan><\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <main>\n\n  <!-- ===================== HOME ===================== -->\n  <sc-if value=\"{{ isHome }}\" hint-placeholder-val=\"{{ true }}\">\n  <div style=\"animation:aiFade .5s ease both;\">\n\n    <!-- Hero -->\n    <section style=\"position:relative;\">\n      <div style=\"position:relative;height:720px;overflow:hidden;border-radius:0 0 28px 28px;\">\n        <image-slot id=\"ai-hero\" shape=\"rect\" fit=\"cover\" placeholder=\"Drop a hero image — architectural photography\" style=\"position:absolute;inset:0;width:100%;height:100%;display:block;\" hint-size=\"100%,100%\"><\u002Fimage-slot>\n        <div style=\"position:absolute;inset:0;background:linear-gradient(100deg,rgba(20,14,11,0.78) 0%,rgba(20,14,11,0.5) 42%,rgba(20,14,11,0.15) 70%,transparent 100%);pointer-events:none;\"><\u002Fdiv>\n        <div style=\"position:absolute;inset:0;display:flex;align-items:center;pointer-events:none;\">\n          <div style=\"max-width:1340px;margin:0 auto;padding:0 30px;width:100%;\">\n            <div style=\"max-width:760px;\">\n              <div style=\"font-size:11.5px;letter-spacing:0.24em;text-transform:uppercase;color:rgba(255,255,255,0.72);margin-bottom:26px;\">Built by an architect · For architects<\u002Fdiv>\n              <h1 style=\"font-size:clamp(38px,5.4vw,76px);line-height:1.02;letter-spacing:-0.025em;font-weight:600;color:#fff;margin:0 0 26px;\">The intersection of architectural thinking and <span style=\"font-family:'Playfair Display',serif;font-style:italic;font-weight:500;\">artificial intelligence.<\u002Fspan><\u002Fh1>\n              <div style=\"font-size:13px;letter-spacing:0.16em;text-transform:uppercase;color:rgba(255,255,255,0.82);margin-bottom:30px;\">Education &nbsp;·&nbsp; Consultancy &nbsp;·&nbsp; Archa<\u002Fdiv>\n              <p style=\"font-size:clamp(16px,1.4vw,19px);line-height:1.6;color:rgba(255,255,255,0.82);max-width:540px;margin:0 0 38px;\">AI is changing architecture. Most platforms are teaching architects to follow it. <span style=\"color:#fff;font-weight:500;\">We teach architects to lead it.<\u002Fspan><\u002Fp>\n              <div style=\"display:flex;flex-wrap:wrap;gap:13px;pointer-events:auto;\">\n                <button onclick=\"{{ goWhat }}\" style=\"display:inline-flex;align-items:center;gap:10px;background:#6E2B2B;color:#fff;padding:15px 26px;border-radius:999px;font-weight:500;font-size:15px;border:none;cursor:pointer;font-family:'Hanken Grotesk',sans-serif;transition:background .2s;\" style-hover=\"background:#823636\">Explore What We Do <span style=\"width:21px;height:21px;border-radius:50%;background:rgba(255,255,255,0.2);display:inline-flex;align-items:center;justify-content:center;font-size:11px;\">↗<\u002Fspan><\u002Fbutton>\n                <button onclick=\"{{ goContact }}\" style=\"display:inline-flex;align-items:center;gap:10px;background:rgba(255,255,255,0.12);color:#fff;padding:15px 26px;border-radius:999px;font-weight:500;font-size:15px;border:1px solid rgba(255,255,255,0.35);cursor:pointer;font-family:'Hanken Grotesk',sans-serif;backdrop-filter:blur(4px);\">Join the Community<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- The Problem -->\n    <section style=\"max-width:1340px;margin:0 auto;padding:120px 30px;\">\n      <div style=\"display:grid;grid-template-columns:0.85fr 1.15fr;gap:72px;align-items:start;\">\n        <div>\n          <div style=\"font-size:11px;letter-spacing:0.22em;text-transform:uppercase;color:#A6675F;margin-bottom:20px;\">Why this exists<\u002Fdiv>\n          <h2 style=\"font-size:clamp(30px,3.8vw,52px);line-height:1.04;letter-spacing:-0.02em;font-weight:600;margin:0;\">Architecture is being left <span style=\"font-family:'Playfair Display',serif;font-style:italic;font-weight:500;color:#6E2B2B;\">behind.<\u002Fspan><\u002Fh2>\n        <\u002Fdiv>\n        <div style=\"max-width:640px;\">\n          <p style=\"font-size:18px;line-height:1.72;color:#5F594F;margin:0 0 24px;\">Architects are using AI blindly. Their work is becoming generic — shaped by AI's patterns, not their own thinking. Students are generating narratives they cannot defend. Firms have no framework, no system, no ethical foundation for the tools they're adopting.<\u002Fp>\n          <p style=\"font-size:20px;line-height:1.6;color:#211E1B;font-weight:600;margin:0 0 24px;letter-spacing:-0.01em;\">The industry has tools. It does not have understanding.<\u002Fp>\n          <p style=\"font-size:18px;line-height:1.72;color:#5F594F;margin:0;\">Architectural Intelligence was built to change that.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- Three Pillars -->\n    <section style=\"background:#FBFAF7;border-radius:28px;margin:0 14px;\">\n      <div style=\"max-width:1340px;margin:0 auto;padding:110px 30px;\">\n        <div style=\"text-align:center;margin-bottom:60px;\">\n          <div style=\"font-size:11px;letter-spacing:0.22em;text-transform:uppercase;color:#A6675F;margin-bottom:18px;\">What we do<\u002Fdiv>\n          <h2 style=\"font-size:clamp(32px,4.2vw,58px);line-height:1.03;letter-spacing:-0.025em;font-weight:600;margin:0;\">Three ways we work <span style=\"font-family:'Playfair Display',serif;font-style:italic;font-weight:500;\">with you.<\u002Fspan><\u002Fh2>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:22px;\">\n          <!-- Education -->\n          <div onclick=\"{{ goEducation }}\" style=\"background:#fff;border:1px solid rgba(0,0,0,0.05);border-radius:22px;overflow:hidden;cursor:pointer;box-shadow:0 14px 40px rgba(40,30,20,0.06);display:flex;flex-direction:column;\">\n            <div style=\"position:relative;height:230px;\">\n              <image-slot id=\"ai-pillar-edu\" shape=\"rect\" fit=\"cover\" placeholder=\"Workshop / teaching photo\" style=\"position:absolute;inset:0;width:100%;height:100%;display:block;\" hint-size=\"100%,230px\"><\u002Fimage-slot>\n              <div style=\"position:absolute;inset:0;background:linear-gradient(to top,rgba(20,15,12,0.72),transparent 60%);pointer-events:none;\"><\u002Fdiv>\n              <div style=\"position:absolute;left:24px;bottom:18px;pointer-events:none;\"><div style=\"font-family:'Playfair Display',serif;font-style:italic;font-size:27px;color:#fff;line-height:1;\">Education<\u002Fdiv><\u002Fdiv>\n              <div style=\"position:absolute;left:20px;top:18px;background:rgba(255,255,255,0.92);border-radius:999px;padding:5px 12px;font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:#6E2B2B;pointer-events:none;\">01<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"padding:30px;display:flex;flex-direction:column;flex:1;\">\n              <p style=\"font-size:15px;line-height:1.65;color:#5F594F;margin:0 0 24px;flex:1;\">Courses, workshops, and masterclasses — teaching the full stack of AI for architects. From understanding what AI actually is, to prompting with intention, to generating outputs that reflect your design vision — not AI's average.<\u002Fp>\n              <span style=\"display:inline-flex;align-items:center;gap:9px;font-size:14.5px;font-weight:600;color:#6E2B2B;\">Explore Education <span style=\"width:20px;height:20px;border-radius:50%;background:rgba(110,43,43,0.1);display:inline-flex;align-items:center;justify-content:center;font-size:10px;\">↗<\u002Fspan><\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <!-- Consultancy -->\n          <div onclick=\"{{ goServices }}\" style=\"background:#fff;border:1px solid rgba(0,0,0,0.05);border-radius:22px;overflow:hidden;cursor:pointer;box-shadow:0 14px 40px rgba(40,30,20,0.06);display:flex;flex-direction:column;\">\n            <div style=\"position:relative;height:230px;\">\n              <image-slot id=\"ai-pillar-con\" shape=\"rect\" fit=\"cover\" placeholder=\"Studio / firm photo\" style=\"position:absolute;inset:0;width:100%;height:100%;display:block;\" hint-size=\"100%,230px\"><\u002Fimage-slot>\n              <div style=\"position:absolute;inset:0;background:linear-gradient(to top,rgba(20,15,12,0.72),transparent 60%);pointer-events:none;\"><\u002Fdiv>\n              <div style=\"position:absolute;left:24px;bottom:18px;pointer-events:none;\"><div style=\"font-family:'Playfair Display',serif;font-style:italic;font-size:27px;color:#fff;line-height:1;\">Consultancy<\u002Fdiv><\u002Fdiv>\n              <div style=\"position:absolute;left:20px;top:18px;background:rgba(255,255,255,0.92);border-radius:999px;padding:5px 12px;font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:#6E2B2B;pointer-events:none;\">02<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"padding:30px;display:flex;flex-direction:column;flex:1;\">\n              <p style=\"font-size:15px;line-height:1.65;color:#5F594F;margin:0 0 24px;flex:1;\">We work directly with architecture firms and individual practitioners. Workflow audits, AI integration mapping, and hands-on implementation — helping you build AI into your practice without losing what makes your work yours.<\u002Fp>\n              <span style=\"display:inline-flex;align-items:center;gap:9px;font-size:14.5px;font-weight:600;color:#6E2B2B;\">Explore Services <span style=\"width:20px;height:20px;border-radius:50%;background:rgba(110,43,43,0.1);display:inline-flex;align-items:center;justify-content:center;font-size:10px;\">↗<\u002Fspan><\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <!-- Archa (dark) -->\n          <div onclick=\"{{ goArcha }}\" style=\"background:#211E1B;border-radius:22px;overflow:hidden;cursor:pointer;box-shadow:0 14px 40px rgba(40,30,20,0.12);display:flex;flex-direction:column;position:relative;\">\n            <div style=\"padding:30px 30px 0;\">\n              <div style=\"display:inline-block;background:rgba(255,255,255,0.1);border-radius:999px;padding:5px 12px;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:#E0B4A8;margin-bottom:60px;\">03 · Product<\u002Fdiv>\n              <div style=\"font-family:'Playfair Display',serif;font-style:italic;font-size:42px;color:#fff;line-height:1;margin-bottom:18px;\">Archa<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"padding:0 30px 30px;display:flex;flex-direction:column;flex:1;\">\n              <p style=\"font-size:15px;line-height:1.65;color:rgba(255,255,255,0.66);margin:0 0 24px;flex:1;\">Our product. An architectural reasoning and thinking tool — not a render generator. Archa thinks like an architect. The studio tier learns from your firm's own work, so every output is grounded in your design DNA.<\u002Fp>\n              <span style=\"display:inline-flex;align-items:center;gap:9px;font-size:14.5px;font-weight:600;color:#fff;\">Discover Archa <span style=\"width:20px;height:20px;border-radius:50%;background:rgba(255,255,255,0.16);display:inline-flex;align-items:center;justify-content:center;font-size:10px;\">↗<\u002Fspan><\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- Core Belief -->\n    <section style=\"max-width:1100px;margin:0 auto;padding:140px 30px;text-align:center;\">\n      <div style=\"font-size:38px;color:#6E2B2B;font-family:'Playfair Display',serif;margin-bottom:24px;\">“<\u002Fdiv>\n      <p style=\"font-size:clamp(28px,3.8vw,50px);line-height:1.18;letter-spacing:-0.02em;font-weight:500;margin:0 0 36px;\">We do not outsource ourselves to AI. We control AI for outcomes stitched to our own <span style=\"font-family:'Playfair Display',serif;font-style:italic;color:#6E2B2B;\">creative thinking.<\u002Fspan><\u002Fp>\n      <p style=\"font-size:13px;letter-spacing:0.14em;text-transform:uppercase;color:#9A938C;margin:0;\">This is the principle behind everything we teach, build, and stand for.<\u002Fp>\n    <\u002Fsection>\n\n    <!-- Founder + Dallas AI -->\n    <section style=\"max-width:1340px;margin:0 auto;padding:0 30px 120px;\">\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:22px;\">\n        <div style=\"background:#fff;border:1px solid rgba(0,0,0,0.05);border-radius:22px;overflow:hidden;box-shadow:0 14px 40px rgba(40,30,20,0.06);display:flex;flex-direction:column;\">\n          <div style=\"display:grid;grid-template-columns:0.8fr 1.2fr;\">\n            <div style=\"position:relative;min-height:260px;\">\n              <image-slot id=\"ai-founder-home\" shape=\"rect\" fit=\"cover\" placeholder=\"Portrait — Ebbad Bhatti\" style=\"position:absolute;inset:0;width:100%;height:100%;display:block;\" hint-size=\"100%,260px\"><\u002Fimage-slot>\n            <\u002Fdiv>\n            <div style=\"padding:38px;display:flex;flex-direction:column;\">\n              <div style=\"font-size:11px;letter-spacing:0.2em;text-transform:uppercase;color:#A6675F;margin-bottom:16px;\">The founder<\u002Fdiv>\n              <h3 style=\"font-size:28px;font-weight:600;margin:0 0 4px;letter-spacing:-0.02em;\">Ebbad Bhatti<\u002Fh3>\n              <p style=\"font-size:14px;color:#9A938C;margin:0 0 22px;\">Architect. Founder. Architectural Intelligence.<\u002Fp>\n              <p style=\"font-size:15px;line-height:1.7;color:#5F594F;margin:0 0 16px;\">Ebbad built this platform because he loves this field — and believes architects deserve better than what they are currently being given.<\u002Fp>\n              <p style=\"font-size:15px;line-height:1.7;color:#5F594F;margin:0 0 26px;\">Five years of architecture education. A deep interest in technology and AI. The conviction that someone who understood both had a responsibility to bridge them.<\u002Fp>\n              <div style=\"display:flex;align-items:center;gap:18px;margin-top:auto;\">\n                <button onclick=\"{{ goAbout }}\" style=\"font-family:'Hanken Grotesk',sans-serif;font-size:14.5px;font-weight:600;color:#6E2B2B;background:none;border:none;cursor:pointer;padding:0;\">About Ebbad ↗<\u002Fbutton>\n                <span style=\"font-size:13px;color:#9A938C;\">in / Ebbad Bhatti<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#211E1B;border-radius:22px;padding:42px;display:flex;flex-direction:column;color:#fff;box-shadow:0 14px 40px rgba(40,30,20,0.12);\">\n          <div style=\"font-size:11px;letter-spacing:0.2em;text-transform:uppercase;color:#E0B4A8;margin-bottom:16px;\">In collaboration with<\u002Fdiv>\n          <h3 style=\"font-size:34px;font-weight:600;margin:0 0 18px;letter-spacing:-0.02em;\">Dallas <span style=\"font-family:'Playfair Display',serif;font-style:italic;font-weight:500;\">AI<\u002Fspan><\u002Fh3>\n          <p style=\"font-size:16px;line-height:1.7;color:rgba(255,255,255,0.66);margin:0 0 32px;flex:1;\">Architectural Intelligence is built in collaboration with Dallas AI — a US-based AI nonprofit working across industry and academia.<\u002Fp>\n          <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:14px;\">\n            <div style=\"background:rgba(255,255,255,0.06);border-radius:14px;padding:22px 16px;text-align:center;\"><div style=\"font-family:'Playfair Display',serif;font-size:24px;margin-bottom:6px;\">501(c)(3)<\u002Fdiv><div style=\"font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.5);\">Nonprofit<\u002Fdiv><\u002Fdiv>\n            <div style=\"background:rgba(255,255,255,0.06);border-radius:14px;padding:22px 16px;text-align:center;\"><div style=\"font-family:'Playfair Display',serif;font-size:24px;margin-bottom:6px;\">10,000+<\u002Fdiv><div style=\"font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.5);\">Community<\u002Fdiv><\u002Fdiv>\n            <div style=\"background:rgba(255,255,255,0.06);border-radius:14px;padding:22px 16px;text-align:center;\"><div style=\"font-family:'Playfair Display',serif;font-size:18px;margin-bottom:6px;line-height:1.1;\">Industry<br>+ Academia<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- Community -->\n    <section style=\"max-width:1340px;margin:0 auto;padding:0 30px 130px;\">\n      <div style=\"position:relative;border-radius:24px;overflow:hidden;background:#6E2B2B;\">\n        <div style=\"position:relative;padding:72px 56px;display:flex;flex-wrap:wrap;gap:40px;align-items:center;justify-content:space-between;\">\n          <div style=\"max-width:560px;\">\n            <div style=\"font-size:11px;letter-spacing:0.2em;text-transform:uppercase;color:rgba(255,255,255,0.7);margin-bottom:18px;\">Join the community<\u002Fdiv>\n            <h2 style=\"font-size:clamp(28px,3.4vw,46px);line-height:1.07;letter-spacing:-0.025em;font-weight:600;margin:0 0 18px;color:#fff;\">Architects figuring this <span style=\"font-family:'Playfair Display',serif;font-style:italic;font-weight:500;\">out together.<\u002Fspan><\u002Fh2>\n            <p style=\"font-size:16.5px;line-height:1.7;color:rgba(255,255,255,0.82);margin:0;\">A space for architects, students, and designers who want to use AI properly. Share work, ask questions, and build alongside others who take this seriously.<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:13px;\">\n            <button style=\"display:inline-flex;align-items:center;justify-content:space-between;gap:16px;background:#fff;color:#6E2B2B;padding:16px 24px;border-radius:999px;font-weight:600;font-size:15px;border:none;cursor:pointer;font-family:'Hanken Grotesk',sans-serif;white-space:nowrap;\">Join on WhatsApp (Pakistan) <span style=\"font-size:12px;\">↗<\u002Fspan><\u002Fbutton>\n            <button style=\"display:inline-flex;align-items:center;justify-content:space-between;gap:16px;background:rgba(255,255,255,0.12);color:#fff;padding:16px 24px;border-radius:999px;font-weight:600;font-size:15px;border:1px solid rgba(255,255,255,0.35);cursor:pointer;font-family:'Hanken Grotesk',sans-serif;white-space:nowrap;\">Join on Discord (International) <span style=\"font-size:12px;\">↗<\u002Fspan><\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===================== WHAT WE DO ===================== -->\n  <sc-if value=\"{{ isWhat }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"animation:aiFade .5s ease both;\">\n    <section style=\"max-width:1340px;margin:0 auto;padding:90px 30px 70px;\">\n      <div style=\"font-size:11px;letter-spacing:0.22em;text-transform:uppercase;color:#A6675F;margin-bottom:22px;\">What we do<\u002Fdiv>\n      <h1 style=\"font-size:clamp(40px,5.6vw,82px);line-height:1.0;letter-spacing:-0.03em;font-weight:600;margin:0 0 30px;\">The full <span style=\"font-family:'Playfair Display',serif;font-style:italic;font-weight:500;color:#6E2B2B;\">picture.<\u002Fspan><\u002Fh1>\n      <p style=\"font-size:clamp(17px,1.6vw,21px);line-height:1.62;color:#5F594F;max-width:780px;margin:0;\">Architectural Intelligence works across three connected areas — education, consultancy, and a product built for architectural thinking. They are not separate services. They are one coherent mission: <span style=\"color:#211E1B;font-weight:600;\">to ensure the architect always remains the author.<\u002Fspan><\u002Fp>\n    <\u002Fsection>\n\n    <section style=\"background:#FBFAF7;border-radius:28px;margin:0 14px;\">\n      <div style=\"max-width:1340px;margin:0 auto;padding:90px 30px;\">\n        <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:22px;align-items:stretch;\">\n          <!-- Education -->\n          <div style=\"background:#fff;border:1px solid rgba(0,0,0,0.05);border-radius:22px;padding:40px;display:flex;flex-direction:column;box-shadow:0 14px 40px rgba(40,30,20,0.05);\">\n            <div style=\"font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:#A6675F;margin-bottom:20px;\">01 — Education<\u002Fdiv>\n            <h3 style=\"font-size:25px;font-weight:600;margin:0 0 4px;letter-spacing:-0.015em;\">Education<\u002Fh3>\n            <p style=\"font-family:'Playfair Display',serif;font-style:italic;font-size:17px;color:#9A938C;margin:0 0 22px;\">Learn. Understand. Apply.<\u002Fp>\n            <p style=\"font-size:15px;line-height:1.65;color:#5F594F;margin:0 0 22px;\">We teach the complete journey — not just the tool, and not just the theory. Both. In sequence.<\u002Fp>\n            <ul style=\"list-style:none;padding:0;margin:0 0 26px;display:flex;flex-direction:column;gap:11px;flex:1;\">\n              <li style=\"font-size:14.5px;line-height:1.5;color:#3F3A33;padding-left:20px;position:relative;\"><span style=\"position:absolute;left:0;color:#6E2B2B;\">—<\u002Fspan>What AI actually is and how it works<\u002Fli>\n              <li style=\"font-size:14.5px;line-height:1.5;color:#3F3A33;padding-left:20px;position:relative;\"><span style=\"position:absolute;left:0;color:#6E2B2B;\">—<\u002Fspan>How to approach AI as a design author<\u002Fli>\n              <li style=\"font-size:14.5px;line-height:1.5;color:#3F3A33;padding-left:20px;position:relative;\"><span style=\"position:absolute;left:0;color:#6E2B2B;\">—<\u002Fspan>Prompt engineering as architectural communication<\u002Fli>\n              <li style=\"font-size:14.5px;line-height:1.5;color:#3F3A33;padding-left:20px;position:relative;\"><span style=\"position:absolute;left:0;color:#6E2B2B;\">—<\u002Fspan>Image generation and visualisation workflows<\u002Fli>\n              <li style=\"font-size:14.5px;line-height:1.5;color:#3F3A33;padding-left:20px;position:relative;\"><span style=\"position:absolute;left:0;color:#6E2B2B;\">—<\u002Fspan>Ethical output — disclosure, verification, authorship<\u002Fli>\n            <\u002Ful>\n            <p style=\"font-size:13.5px;line-height:1.6;color:#9A938C;margin:0 0 24px;\">For architecture students, working architects, and small firm owners. Starting in Pakistan. Open to the world.<\u002Fp>\n            <button onclick=\"{{ goEducation }}\" style=\"align-self:flex-start;display:inline-flex;align-items:center;gap:9px;background:#6E2B2B;color:#fff;padding:13px 22px;border-radius:999px;font-weight:500;font-size:14px;border:none;cursor:pointer;font-family:'Hanken Grotesk',sans-serif;\">Explore Education <span style=\"font-size:11px;\">↗<\u002Fspan><\u002Fbutton>\n          <\u002Fdiv>\n          <!-- Consultancy -->\n          <div style=\"background:#fff;border:1px solid rgba(0,0,0,0.05);border-radius:22px;padding:40px;display:flex;flex-direction:column;box-shadow:0 14px 40px rgba(40,30,20,0.05);\">\n            <div style=\"font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:#A6675F;margin-bottom:20px;\">02 — Consultancy<\u002Fdiv>\n            <h3 style=\"font-size:25px;font-weight:600;margin:0 0 4px;letter-spacing:-0.015em;\">Consultancy<\u002Fh3>\n            <p style=\"font-family:'Playfair Display',serif;font-style:italic;font-size:17px;color:#9A938C;margin:0 0 22px;\">Design. Audit. Implement.<\u002Fp>\n            <p style=\"font-size:15px;line-height:1.65;color:#5F594F;margin:0 0 22px;\">We work directly with architecture firms — mapping their current workflow, identifying where AI can genuinely help, and building a practical integration plan that fits how they already design.<\u002Fp>\n            <ul style=\"list-style:none;padding:0;margin:0 0 26px;display:flex;flex-direction:column;gap:11px;flex:1;\">\n              <li style=\"font-size:14.5px;line-height:1.5;color:#3F3A33;padding-left:20px;position:relative;\"><span style=\"position:absolute;left:0;color:#6E2B2B;\">—<\u002Fspan>Workflow audit and AI opportunity mapping<\u002Fli>\n              <li style=\"font-size:14.5px;line-height:1.5;color:#3F3A33;padding-left:20px;position:relative;\"><span style=\"position:absolute;left:0;color:#6E2B2B;\">—<\u002Fspan>Tool selection and ethical framework building<\u002Fli>\n              <li style=\"font-size:14.5px;line-height:1.5;color:#3F3A33;padding-left:20px;position:relative;\"><span style=\"position:absolute;left:0;color:#6E2B2B;\">—<\u002Fspan>Team implementation support<\u002Fli>\n              <li style=\"font-size:14.5px;line-height:1.5;color:#3F3A33;padding-left:20px;position:relative;\"><span style=\"position:absolute;left:0;color:#6E2B2B;\">—<\u002Fspan>Ongoing advisory<\u002Fli>\n            <\u002Ful>\n            <p style=\"font-size:13.5px;line-height:1.6;color:#9A938C;margin:0 0 24px;\">Available now. No product needed. Just a conversation.<\u002Fp>\n            <button onclick=\"{{ goContact }}\" style=\"align-self:flex-start;display:inline-flex;align-items:center;gap:9px;background:#6E2B2B;color:#fff;padding:13px 22px;border-radius:999px;font-weight:500;font-size:14px;border:none;cursor:pointer;font-family:'Hanken Grotesk',sans-serif;\">Book a Consultation <span style=\"font-size:11px;\">↗<\u002Fspan><\u002Fbutton>\n          <\u002Fdiv>\n          <!-- Archa dark -->\n          <div style=\"background:#211E1B;border-radius:22px;padding:40px;display:flex;flex-direction:column;color:#fff;box-shadow:0 14px 40px rgba(40,30,20,0.12);\">\n            <div style=\"font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:#E0B4A8;margin-bottom:20px;\">03 — Archa · Product<\u002Fdiv>\n            <div style=\"font-family:'Playfair Display',serif;font-style:italic;font-size:34px;margin:0 0 4px;line-height:1;\">Archa<\u002Fdiv>\n            <p style=\"font-size:15px;color:rgba(255,255,255,0.55);margin:14px 0 22px;\">AI that thinks like an architect.<\u002Fp>\n            <p style=\"font-size:15px;line-height:1.65;color:rgba(255,255,255,0.66);margin:0 0 24px;\">Archa is not a render tool. It is a reasoning and thinking tool — built on architectural logic, spatial understanding, and design intelligence.<\u002Fp>\n            <div style=\"display:flex;flex-direction:column;gap:18px;flex:1;margin-bottom:28px;\">\n              <div><div style=\"font-size:13px;font-weight:600;color:#fff;margin-bottom:5px;\">Basic<\u002Fdiv><div style=\"font-size:14px;line-height:1.55;color:rgba(255,255,255,0.6);\">Any architect can use it to think, research, build narratives, and develop concepts.<\u002Fdiv><\u002Fdiv>\n              <div><div style=\"font-size:13px;font-weight:600;color:#fff;margin-bottom:5px;\">Studio<\u002Fdiv><div style=\"font-size:14px;line-height:1.55;color:rgba(255,255,255,0.6);\">Trained on your firm's own projects, drawings, and decisions. Your design DNA becomes the foundation.<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n            <button onclick=\"{{ goArcha }}\" style=\"align-self:flex-start;display:inline-flex;align-items:center;gap:9px;background:#fff;color:#211E1B;padding:13px 22px;border-radius:999px;font-weight:600;font-size:14px;border:none;cursor:pointer;font-family:'Hanken Grotesk',sans-serif;\">Discover Archa <span style=\"font-size:11px;\">↗<\u002Fspan><\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <section style=\"max-width:1040px;margin:0 auto;padding:140px 30px;text-align:center;\">\n      <p style=\"font-size:clamp(26px,3.6vw,46px);line-height:1.2;letter-spacing:-0.02em;font-weight:500;margin:0;\">Every platform teaches architects what AI can do. <span style=\"font-family:'Playfair Display',serif;font-style:italic;color:#6E2B2B;\">We teach architects what they can do with AI.<\u002Fspan><\u002Fp>\n    <\u002Fsection>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===================== EDUCATION ===================== -->\n  <sc-if value=\"{{ isEducation }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"animation:aiFade .5s ease both;\">\n    <section style=\"max-width:1340px;margin:0 auto;padding:90px 30px 70px;\">\n      <div style=\"font-size:11px;letter-spacing:0.22em;text-transform:uppercase;color:#A6675F;margin-bottom:22px;\">Education<\u002Fdiv>\n      <h1 style=\"font-size:clamp(36px,5vw,74px);line-height:1.02;letter-spacing:-0.03em;font-weight:600;margin:0 0 30px;\">Not tool tutorials.<br><span style=\"font-family:'Playfair Display',serif;font-style:italic;font-weight:500;color:#6E2B2B;\">Understanding.<\u002Fspan><\u002Fh1>\n      <div style=\"max-width:780px;\">\n        <p style=\"font-size:clamp(16px,1.5vw,20px);line-height:1.65;color:#5F594F;margin:0 0 20px;\">Anyone can teach you which buttons to press. We teach you why it works, what it cannot do, and how to use it in a way that makes your design thinking stronger — not weaker.<\u002Fp>\n        <p style=\"font-size:clamp(16px,1.5vw,20px);line-height:1.65;color:#5F594F;margin:0;\">We teach the full stack: from the foundation of what AI actually is, all the way to generating outputs that reflect your vision.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- Five stages -->\n    <section style=\"background:#FBFAF7;border-radius:28px;margin:0 14px;\">\n      <div style=\"max-width:1340px;margin:0 auto;padding:90px 30px;\">\n        <div style=\"text-align:center;margin-bottom:54px;\">\n          <div style=\"font-size:11px;letter-spacing:0.22em;text-transform:uppercase;color:#A6675F;margin-bottom:18px;\">The learning journey<\u002Fdiv>\n          <h2 style=\"font-size:clamp(28px,3.6vw,50px);line-height:1.04;letter-spacing:-0.025em;font-weight:600;margin:0;\">Five stages. One <span style=\"font-family:'Playfair Display',serif;font-style:italic;font-weight:500;\">continuous journey.<\u002Fspan><\u002Fh2>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:repeat(5,1fr);gap:14px;\">\n          <div style=\"background:#fff;border:1px solid rgba(0,0,0,0.05);border-radius:18px;padding:28px 22px;display:flex;flex-direction:column;\">\n            <div style=\"font-family:'Playfair Display',serif;font-size:30px;color:#6E2B2B;margin-bottom:16px;\">01<\u002Fdiv>\n            <h4 style=\"font-size:18px;font-weight:600;margin:0 0 12px;\">Understand<\u002Fh4>\n            <p style=\"font-size:13.5px;line-height:1.6;color:#5F594F;margin:0;\">What AI actually is. How it works. What it cannot do. Why that matters specifically for architecture and design.<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid rgba(0,0,0,0.05);border-radius:18px;padding:28px 22px;display:flex;flex-direction:column;\">\n            <div style=\"font-family:'Playfair Display',serif;font-size:30px;color:#6E2B2B;margin-bottom:16px;\">02<\u002Fdiv>\n            <h4 style=\"font-size:18px;font-weight:600;margin:0 0 12px;\">Think<\u002Fh4>\n            <p style=\"font-size:13.5px;line-height:1.6;color:#5F594F;margin:0;\">How to approach AI as an author. Bringing intention, context, and design thinking into every interaction — before a single prompt.<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid rgba(0,0,0,0.05);border-radius:18px;padding:28px 22px;display:flex;flex-direction:column;\">\n            <div style=\"font-family:'Playfair Display',serif;font-size:30px;color:#6E2B2B;margin-bottom:16px;\">03<\u002Fdiv>\n            <h4 style=\"font-size:18px;font-weight:600;margin:0 0 12px;\">Prompt<\u002Fh4>\n            <p style=\"font-size:13.5px;line-height:1.6;color:#5F594F;margin:0;\">Prompt engineering as architectural communication. Structured briefs, not vague requests. Precision in language produces precision in output.<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid rgba(0,0,0,0.05);border-radius:18px;padding:28px 22px;display:flex;flex-direction:column;\">\n            <div style=\"font-family:'Playfair Display',serif;font-size:30px;color:#6E2B2B;margin-bottom:16px;\">04<\u002Fdiv>\n            <h4 style=\"font-size:18px;font-weight:600;margin:0 0 12px;\">Generate<\u002Fh4>\n            <p style=\"font-size:13.5px;line-height:1.6;color:#5F594F;margin:0;\">Image generation, visualisation workflows, AI tools for concept development. Outputs that reflect your vision — not AI's average.<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"background:#211E1B;border-radius:18px;padding:28px 22px;display:flex;flex-direction:column;color:#fff;\">\n            <div style=\"font-family:'Playfair Display',serif;font-size:30px;color:#E0B4A8;margin-bottom:16px;\">05<\u002Fdiv>\n            <h4 style=\"font-size:18px;font-weight:600;margin:0 0 12px;\">Output ethically<\u002Fh4>\n            <p style=\"font-size:13.5px;line-height:1.6;color:rgba(255,255,255,0.6);margin:0;\">How to review, verify, disclose, and take responsibility for AI-assisted work. Maintaining authorship throughout.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- Courses -->\n    <section style=\"max-width:1340px;margin:0 auto;padding:110px 30px 90px;\">\n      <div style=\"font-size:11px;letter-spacing:0.22em;text-transform:uppercase;color:#A6675F;margin-bottom:18px;\">Courses<\u002Fdiv>\n      <h2 style=\"font-size:clamp(28px,3.6vw,50px);line-height:1.04;letter-spacing:-0.025em;font-weight:600;margin:0 0 50px;\">What we <span style=\"font-family:'Playfair Display',serif;font-style:italic;font-weight:500;color:#6E2B2B;\">teach.<\u002Fspan><\u002Fh2>\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:22px;\">\n        <div style=\"background:#fff;border:1px solid rgba(0,0,0,0.05);border-radius:20px;padding:38px;box-shadow:0 12px 36px rgba(40,30,20,0.05);\">\n          <h3 style=\"font-size:22px;font-weight:600;margin:0 0 14px;letter-spacing:-0.01em;\">Foundations of AI for Architects<\u002Fh3>\n          <p style=\"font-size:15px;line-height:1.68;color:#5F594F;margin:0 0 24px;\">The starting point. What AI is, how it works, what it cannot do, and how to think about it as an architect. Includes the Ethical AI Framework and a hands-on prompting exercise.<\u002Fp>\n          <div style=\"display:flex;gap:10px;margin-bottom:26px;flex-wrap:wrap;\"><span style=\"background:#F0ECE5;border:1px solid rgba(0,0,0,0.05);border-radius:999px;padding:6px 14px;font-size:12px;color:#6E6862;\">Beginner<\u002Fspan><span style=\"background:#F0ECE5;border:1px solid rgba(0,0,0,0.05);border-radius:999px;padding:6px 14px;font-size:12px;color:#6E6862;\">Online / Workshop<\u002Fspan><\u002Fdiv>\n          <button style=\"font-family:'Hanken Grotesk',sans-serif;font-size:14.5px;font-weight:600;color:#6E2B2B;background:none;border:none;cursor:pointer;padding:0;\">Join the waitlist ↗<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid rgba(0,0,0,0.05);border-radius:20px;padding:38px;box-shadow:0 12px 36px rgba(40,30,20,0.05);\">\n          <h3 style=\"font-size:22px;font-weight:600;margin:0 0 14px;letter-spacing:-0.01em;\">Prompt Engineering for Architectural Design<\u002Fh3>\n          <p style=\"font-size:15px;line-height:1.68;color:#5F594F;margin:0 0 24px;\">How to communicate with AI as precisely as you would write a design brief. Structured prompting, context-setting, and the difference between a generic output and an intentional one.<\u002Fp>\n          <div style=\"display:flex;gap:10px;margin-bottom:26px;flex-wrap:wrap;\"><span style=\"background:#F0ECE5;border:1px solid rgba(0,0,0,0.05);border-radius:999px;padding:6px 14px;font-size:12px;color:#6E6862;\">Intermediate<\u002Fspan><span style=\"background:#F0ECE5;border:1px solid rgba(0,0,0,0.05);border-radius:999px;padding:6px 14px;font-size:12px;color:#6E6862;\">Online / Workshop<\u002Fspan><\u002Fdiv>\n          <button style=\"font-family:'Hanken Grotesk',sans-serif;font-size:14.5px;font-weight:600;color:#6E2B2B;background:none;border:none;cursor:pointer;padding:0;\">Join the waitlist ↗<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid rgba(0,0,0,0.05);border-radius:20px;padding:38px;box-shadow:0 12px 36px rgba(40,30,20,0.05);\">\n          <h3 st
